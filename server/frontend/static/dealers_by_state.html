<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dealers by State - Car Dealership</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">Car Dealership</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/about/">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/contact/">Contact</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-12">
                <h2 id="page-title">Dealers by State</h2>
                
                <!-- State Filter -->
                <div class="card mb-4">
                    <div class="card-body">
                        <h5 class="card-title">Filter by State</h5>
                        <div class="row">
                            <div class="col-md-6">
                                <select id="state-select" class="form-select">
                                    <option value="">Select a state...</option>
                                    <option value="CA">California</option>
                                    <option value="TX">Texas</option>
                                    <option value="NY">New York</option>
                                    <option value="FL">Florida</option>
                                    <option value="IL">Illinois</option>
                                    <option value="PA">Pennsylvania</option>
                                    <option value="OH">Ohio</option>
                                    <option value="GA">Georgia</option>
                                    <option value="NC">North Carolina</option>
                                    <option value="MI">Michigan</option>
                                    <option value="KS">Kansas</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <button id="filter-btn" class="btn btn-primary">Filter Dealers</button>
                                <button id="clear-btn" class="btn btn-secondary">Show All</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Dealers List -->
                <div id="dealers-container">
                    <div class="row" id="dealer-list">
                        <!-- Dealers will be loaded here via JavaScript -->
                    </div>
                </div>

                <!-- Loading indicator -->
                <div id="loading" class="text-center" style="display: none;">
                    <div class="spinner-border" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>

                <!-- No results message -->
                <div id="no-results" class="alert alert-info" style="display: none;">
                    <h5>No dealers found</h5>
                    <p>No dealers were found for the selected state. Please try a different state.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let allDealers = [];

        // Load all dealers on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadAllDealers();
            
            // Check URL for state parameter
            const urlParams = new URLSearchParams(window.location.search);
            const state = urlParams.get('state');
            if (state) {
                document.getElementById('state-select').value = state;
                filterDealersByState(state);
            }
        });

        // Event listeners
        document.getElementById('filter-btn').addEventListener('click', function() {
            const selectedState = document.getElementById('state-select').value;
            if (selectedState) {
                filterDealersByState(selectedState);
                // Update URL
                const url = new URL(window.location);
                url.searchParams.set('state', selectedState);
                window.history.pushState({}, '', url);
            }
        });

        document.getElementById('clear-btn').addEventListener('click', function() {
            document.getElementById('state-select').value = '';
            displayDealers(allDealers);
            document.getElementById('page-title').textContent = 'All Dealers';
            // Clear URL parameter
            const url = new URL(window.location);
            url.searchParams.delete('state');
            window.history.pushState({}, '', url);
        });

        async function loadAllDealers() {
            showLoading(true);
            try {
                const response = await fetch('/api/dealers/');
                allDealers = await response.json();
                displayDealers(allDealers);
            } catch (error) {
                console.error('Error loading dealers:', error);
                showError('Failed to load dealers');
            } finally {
                showLoading(false);
            }
        }

        async function filterDealersByState(state) {
            showLoading(true);
            try {
                const response = await fetch(`/api/dealers/state/${state}/`);
                const dealers = await response.json();
                displayDealers(dealers);
                document.getElementById('page-title').textContent = `Dealers in ${getStateName(state)}`;
            } catch (error) {
                console.error('Error filtering dealers:', error);
                showError('Failed to filter dealers');
            } finally {
                showLoading(false);
            }
        }

        function displayDealers(dealers) {
            const dealerList = document.getElementById('dealer-list');
            const noResults = document.getElementById('no-results');
            
            if (dealers.length === 0) {
                dealerList.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }
            
            noResults.style.display = 'none';
            dealerList.innerHTML = '';

            dealers.forEach(dealer => {
                const dealerCard = `
                    <div class="col-md-4 mb-4">
                        <div class="card h-100">
                            <div class="card-body">
                                <h5 class="card-title">${dealer.name}</h5>
                                <p class="card-text">
                                    <strong>Location:</strong> ${dealer.city}, ${dealer.state}<br>
                                    <strong>Phone:</strong> ${dealer.phone || 'N/A'}<br>
                                    <strong>Email:</strong> ${dealer.email || 'N/A'}
                                </p>
                                <a href="/dealer/${dealer.id}/" class="btn btn-primary">View Details</a>
                            </div>
                        </div>
                    </div>
                `;
                dealerList.innerHTML += dealerCard;
            });
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function showError(message) {
            const dealerList = document.getElementById('dealer-list');
            dealerList.innerHTML = `
                <div class="col-12">
                    <div class="alert alert-danger" role="alert">
                        ${message}
                    </div>
                </div>
            `;
        }

        function getStateName(code) {
            const states = {
                'CA': 'California',
                'TX': 'Texas',
                'NY': 'New York',
                'FL': 'Florida',
                'IL': 'Illinois',
                'PA': 'Pennsylvania',
                'OH': 'Ohio',
                'GA': 'Georgia',
                'NC': 'North Carolina',
                'MI': 'Michigan',
                'KS': 'Kansas'
            };
            return states[code] || code;
        }
    </script>
</body>
</html>
