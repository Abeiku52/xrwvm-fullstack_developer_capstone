<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Added - Car Dealership</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">Car Dealership</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/about/">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/contact/">Contact</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <!-- Success Message -->
                <div class="alert alert-success">
                    <div class="d-flex align-items-center">
                        <div class="me-3">
                            <i class="fas fa-check-circle fa-2x"></i>
                        </div>
                        <div>
                            <h5 class="alert-heading mb-1">Review Successfully Added!</h5>
                            <p class="mb-0">Thank you for sharing your experience. Your review has been posted.</p>
                        </div>
                    </div>
                </div>

                <!-- Dealer Information -->
                <div class="card mb-4">
                    <div class="card-body" id="dealer-info">
                        <div class="text-center">
                            <div class="spinner-border" role="status">
                                <span class="visually-hidden">Loading dealer information...</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Latest Review (the one just added) -->
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Your Review</h5>
                    </div>
                    <div class="card-body" id="latest-review">
                        <div class="text-center">
                            <div class="spinner-border" role="status">
                                <span class="visually-hidden">Loading your review...</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="text-center mt-4">
                    <button class="btn btn-primary me-2" onclick="goBackToDealer()">View All Reviews</button>
                    <button class="btn btn-secondary" onclick="goHome()">Back to Home</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentDealerId = null;

        document.addEventListener('DOMContentLoaded', function() {
            // Get dealer ID from URL
            const pathParts = window.location.pathname.split('/');
            const dealerIndex = pathParts.indexOf('dealer');
            if (dealerIndex !== -1 && pathParts[dealerIndex + 1]) {
                currentDealerId = pathParts[dealerIndex + 1];
                loadDealerInfo(currentDealerId);
                loadLatestReview(currentDealerId);
            } else {
                showError('Dealer ID not found in URL');
            }
        });

        async function loadDealerInfo(dealerId) {
            try {
                const response = await fetch(`/api/dealers/${dealerId}/`);
                if (!response.ok) {
                    throw new Error('Dealer not found');
                }
                const dealer = await response.json();
                displayDealerInfo(dealer);
            } catch (error) {
                console.error('Error loading dealer info:', error);
                document.getElementById('dealer-info').innerHTML = `
                    <div class="alert alert-danger" role="alert">
                        Failed to load dealer information: ${error.message}
                    </div>
                `;
            }
        }

        async function loadLatestReview(dealerId) {
            try {
                const response = await fetch(`/api/reviews/${dealerId}/`);
                const reviews = await response.json();
                
                if (reviews.length > 0) {
                    // Show the most recent review (first in the array due to ordering)
                    displayLatestReview(reviews[0]);
                } else {
                    document.getElementById('latest-review').innerHTML = `
                        <div class="text-center">
                            <p>No reviews found.</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading reviews:', error);
                document.getElementById('latest-review').innerHTML = `
                    <div class="alert alert-warning" role="alert">
                        Failed to load review.
                    </div>
                `;
            }
        }

        function displayDealerInfo(dealer) {
            document.title = `Review Added for ${dealer.name} - Car Dealership`;
            document.getElementById('dealer-info').innerHTML = `
                <div class="d-flex align-items-center">
                    <div class="me-3">
                        <i class="fas fa-building fa-2x text-primary"></i>
                    </div>
                    <div>
                        <h5 class="mb-1">Review added for: ${dealer.name}</h5>
                        <p class="mb-0 text-muted">${dealer.city}, ${dealer.state}</p>
                    </div>
                </div>
            `;
        }

        function displayLatestReview(review) {
            const sentimentBadge = getSentimentBadge(review.sentiment);
            const rating = '★'.repeat(review.rating || 5) + '☆'.repeat(5 - (review.rating || 5));
            
            document.getElementById('latest-review').innerHTML = `
                <div class="border rounded p-3 bg-light">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div>
                            <h6 class="mb-1">${review.user_name || 'Demo User'}</h6>
                            <div class="text-warning mb-2" style="font-size: 1.2em;">${rating}</div>
                        </div>
                        <div class="text-end">
                            ${sentimentBadge}
                            <small class="text-muted d-block">${formatDate(review.created_at)}</small>
                        </div>
                    </div>
                    <p class="mb-2">${review.review_text || 'No review text provided.'}</p>
                    ${review.car_make ? `
                        <div class="mt-3 p-2 bg-white rounded">
                            <small class="text-muted">
                                <strong>Vehicle:</strong> ${review.car_make} ${review.car_model || ''} 
                                ${review.car_year ? `(${review.car_year})` : ''}
                            </small>
                        </div>
                    ` : ''}
                    <div class="mt-3">
                        <span class="badge bg-success">✓ Recently Added</span>
                    </div>
                </div>
            `;
        }

        function getSentimentBadge(sentiment) {
            const badges = {
                'positive': '<span class="badge bg-success">Positive</span>',
                'negative': '<span class="badge bg-danger">Negative</span>',
                'neutral': '<span class="badge bg-secondary">Neutral</span>'
            };
            return badges[sentiment] || badges['neutral'];
        }

        function formatDate(dateString) {
            if (!dateString) return 'Just now';
            const date = new Date(dateString);
            return date.toLocaleDateString() + ' at ' + date.toLocaleTimeString();
        }

        function goBackToDealer() {
            window.location.href = `/dealer/${currentDealerId}/`;
        }

        function goHome() {
            window.location.href = '/';
        }

        function showError(message) {
            document.getElementById('dealer-info').innerHTML = `
                <div class="alert alert-danger" role="alert">
                    ${message}
                </div>
            `;
        }
    </script>
</body>
</html>
