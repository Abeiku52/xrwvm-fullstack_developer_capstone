<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dealer Details - Car Dealership</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">Car Dealership</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/about/">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/contact/">Contact</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Dealer Information -->
        <div class="row">
            <div class="col-md-12">
                <div class="card mb-4">
                    <div class="card-body" id="dealer-info">
                        <!-- Dealer details will be loaded here -->
                        <div class="text-center">
                            <div class="spinner-border" role="status">
                                <span class="visually-hidden">Loading dealer information...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Reviews Section -->
        <div class="row">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">Customer Reviews</h5>
                        <button id="add-review-btn" class="btn btn-success btn-sm">Add Review</button>
                    </div>
                    <div class="card-body">
                        <div id="reviews-container">
                            <!-- Reviews will be loaded here -->
                            <div class="text-center">
                                <div class="spinner-border" role="status">
                                    <span class="visually-hidden">Loading reviews...</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentDealerId = null;

        document.addEventListener('DOMContentLoaded', function() {
            // Get dealer ID from URL
            const pathParts = window.location.pathname.split('/');
            currentDealerId = pathParts[pathParts.length - 2]; // Assuming URL like /dealer/123/
            
            if (currentDealerId) {
                loadDealerDetails(currentDealerId);
                loadDealerReviews(currentDealerId);
            } else {
                showError('Dealer ID not found in URL');
            }

            // Add review button event
            document.getElementById('add-review-btn').addEventListener('click', function() {
                window.location.href = `/dealer/${currentDealerId}/review/`;
            });
        });

        async function loadDealerDetails(dealerId) {
            try {
                const response = await fetch(`/api/dealers/${dealerId}/`);
                if (!response.ok) {
                    throw new Error('Dealer not found');
                }
                const dealer = await response.json();
                displayDealerDetails(dealer);
            } catch (error) {
                console.error('Error loading dealer details:', error);
                document.getElementById('dealer-info').innerHTML = `
                    <div class="alert alert-danger" role="alert">
                        Failed to load dealer information: ${error.message}
                    </div>
                `;
            }
        }

        async function loadDealerReviews(dealerId) {
            try {
                const response = await fetch(`/api/reviews/${dealerId}/`);
                const reviews = await response.json();
                displayReviews(reviews);
            } catch (error) {
                console.error('Error loading reviews:', error);
                document.getElementById('reviews-container').innerHTML = `
                    <div class="alert alert-warning" role="alert">
                        Failed to load reviews. This dealer may not have any reviews yet.
                    </div>
                `;
            }
        }

        function displayDealerDetails(dealer) {
            document.title = `${dealer.name} - Car Dealership`;
            document.getElementById('dealer-info').innerHTML = `
                <div class="row">
                    <div class="col-md-8">
                        <h2>${dealer.name}</h2>
                        <p class="text-muted">Dealer ID: ${dealer.id}</p>
                        <div class="row">
                            <div class="col-md-6">
                                <h6>Contact Information</h6>
                                <p>
                                    <strong>Address:</strong><br>
                                    ${dealer.address || 'N/A'}<br>
                                    ${dealer.city}, ${dealer.state} ${dealer.zip || ''}
                                </p>
                                <p>
                                    <strong>Phone:</strong> ${dealer.phone || 'N/A'}<br>
                                    <strong>Email:</strong> ${dealer.email || 'N/A'}
                                </p>
                            </div>
                            <div class="col-md-6">
                                <h6>Business Hours</h6>
                                <p>
                                    Monday - Friday: 9:00 AM - 8:00 PM<br>
                                    Saturday: 9:00 AM - 6:00 PM<br>
                                    Sunday: 12:00 PM - 5:00 PM
                                </p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card bg-light">
                            <div class="card-body text-center">
                                <h6>Quick Actions</h6>
                                <button class="btn btn-primary btn-sm mb-2 w-100">View Inventory</button>
                                <button class="btn btn-outline-primary btn-sm mb-2 w-100">Schedule Test Drive</button>
                                <button class="btn btn-success btn-sm w-100" onclick="document.getElementById('add-review-btn').click()">Write Review</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function displayReviews(reviews) {
            const container = document.getElementById('reviews-container');
            
            if (reviews.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-4">
                        <h6>No reviews yet</h6>
                        <p class="text-muted">Be the first to review this dealer!</p>
                        <button class="btn btn-success" onclick="document.getElementById('add-review-btn').click()">Write First Review</button>
                    </div>
                `;
                return;
            }

            let reviewsHtml = '';
            reviews.forEach(review => {
                const sentimentBadge = getSentimentBadge(review.sentiment);
                const rating = '★'.repeat(review.rating || 5) + '☆'.repeat(5 - (review.rating || 5));
                
                reviewsHtml += `
                    <div class="border-bottom pb-3 mb-3">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <h6 class="mb-1">${review.user_name || 'Anonymous'}</h6>
                                <div class="text-warning mb-2">${rating}</div>
                            </div>
                            <div class="text-end">
                                ${sentimentBadge}
                                <small class="text-muted d-block">${formatDate(review.created_at)}</small>
                            </div>
                        </div>
                        <p class="mb-2">${review.review_text || 'No review text provided.'}</p>
                        ${review.car_make ? `<small class="text-muted">Car: ${review.car_make} ${review.car_model || ''} (${review.car_year || 'N/A'})</small>` : ''}
                    </div>
                `;
            });

            container.innerHTML = reviewsHtml;
        }

        function getSentimentBadge(sentiment) {
            const badges = {
                'positive': '<span class="badge bg-success">Positive</span>',
                'negative': '<span class="badge bg-danger">Negative</span>',
                'neutral': '<span class="badge bg-secondary">Neutral</span>'
            };
            return badges[sentiment] || badges['neutral'];
        }

        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            const date = new Date(dateString);
            return date.toLocaleDateString();
        }

        function showError(message) {
            document.getElementById('dealer-info').innerHTML = `
                <div class="alert alert-danger" role="alert">
                    ${message}
                </div>
            `;
        }
    </script>
</body>
</html>
